<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} - PreMortem AI</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="/static/img/logo.svg" alt="PreMortem AI logo">
        <span>PreMortem AI</span>
      </div>
      <nav>
        <a href="/">Dashboard</a>
        <a href="/setup">Setup</a>
        <a href="/splunk/search">Splunk Search</a>
        <a href="/investigations">Investigations</a>
        <a href="/reports">Reports</a>
        <a href="/health">Health</a>
      </nav>
    </aside>
    <main class="content">
      <header class="topbar">
        <h1>{{ title }}</h1>
      </header>
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
