{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Generated Reports</h2>
  <table>
    <thead><tr><th>ID</th><th>Investigation</th><th>Title</th><th>Created</th><th>View</th></tr></thead>
    <tbody>
      {% for report in reports %}
      <tr>
        <td>{{ report.id }}</td>
        <td>{{ report.investigation_id }}</td>
        <td>{{ report.title }}</td>
        <td>{{ report.created_at }}</td>
        <td><a href="/api/reports/{{ report.id }}/markdown">Markdown</a></td>
      </tr>
      {% else %}
      <tr><td colspan="5">No reports generated yet.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
