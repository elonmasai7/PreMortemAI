apiVersion: apps/v1
kind: Deployment
metadata:
  name: premortem-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: premortem-api
  template:
    metadata:
      labels:
        app: premortem-api
    spec:
      containers:
        - name: api
          image: premortem-ai:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: premortem-env
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
---
apiVersion: v1
kind: Service
metadata:
  name: premortem-api
spec:
  selector:
    app: premortem-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
