apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: premortem-worker-scaledobject
spec:
  scaleTargetRef:
    name: premortem-worker
  pollingInterval: 15
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 20
  triggers:
    - type: redis
      metadata:
        address: redis.default.svc.cluster.local:6379
        listName: rq:queue:investigations
        listLength: "25"
