version: "3.9"

services:
  app:
    image: premortem-ai:latest
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    image: premortem-ai:latest
    env_file:
      - .env
    restart: unless-stopped
    command: python scripts/run_worker.py
